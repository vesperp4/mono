version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      # ESLint 10 requires scopeManager.addGlobals(); typescript-eslint and
      # eslint-config-next don't yet implement it. Pin to v9 until they do.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/apps/mainsite/api"
    target-branch: "main"
    schedule:
      interval: "weekly"
    groups:
      cargo:
        patterns:
          - "*"
