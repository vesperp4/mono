version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      # ESLint 10 requires scopeManager.addGlobals(); typescript-eslint and
      # eslint-config-next don't yet implement it. Pin to v9 until they do.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/apps/portal/api"
    target-branch: "main"
    schedule:
      interval: "weekly"
    groups:
      cargo:
        patterns:
          - "*"
    ignore:
      # These majors carry breaking API changes that need a deliberate code
      # migration (rand 0.9+ renamed thread_rng()/moved RngCore; sha2 0.11 and
      # tower-http 0.7 change their APIs). Take them in a focused PR, not an
      # auto-bump. Minor/patch updates still flow.
      - dependency-name: "rand"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sha2"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tower-http"
        update-types: ["version-update:semver-major"]
