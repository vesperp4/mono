name: Update Infra

# Reusable workflow that bumps the pinned image tag for an environment in the
# infra repo by opening (and optionally auto-merging) a PR. The infra repo holds
# Bicep + per-env .bicepparam files; merging triggers its own deploy workflow.
on:
  workflow_call:
    inputs:
      image:
        description: Image/component name (matches apps/<env>/<app_group>/<image>.bicepparam)
        type: string
        required: true
      app_group:
        description: App group / site the component belongs to (param subdir)
        type: string
        required: true
      tag:
        description: Image tag to pin
        type: string
        required: true
      environment:
        description: Target environment (dev|prod)
        type: string
        required: true
      auto_merge:
        description: Auto-merge the PR (dev only)
        type: boolean
        default: false
    secrets:
      infra_app_id:
        required: true
      infra_app_key:
        required: true

concurrency:
  group: update-infra-${{ inputs.image }}-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Mint infra-repo app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.infra_app_id }}
          private-key: ${{ secrets.infra_app_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ vars.INFRA_REPO_NAME }}

      - name: Checkout infra repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ github.repository_owner }}/${{ vars.INFRA_REPO_NAME }}
          token: ${{ steps.app-token.outputs.token }}
          path: infra
          persist-credentials: false

      - name: Checkout this repo (for CI scripts)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: actions-repo

      - name: Pin image tag in bicepparam
        run: |
          bash actions-repo/scripts/ci/patch-bicepparam.sh \
            "infra/apps/${{ inputs.environment }}/${{ inputs.app_group }}/${{ inputs.image }}.bicepparam" \
            "${{ inputs.tag }}"

      - name: Create or update PR
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: infra
          branch: bump/${{ inputs.image }}/${{ inputs.environment }}/${{ inputs.tag }}
          commit-message: "chore(${{ inputs.environment }}): bump ${{ inputs.image }} to ${{ inputs.tag }}"
          title: "chore(${{ inputs.environment }}): bump ${{ inputs.image }} to ${{ inputs.tag }}"
          body: |
            Automated image bump from `${{ github.repository }}@${{ github.sha }}`.

            Source run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          labels: |
            automated
            ${{ inputs.environment }}

      - name: Enable auto-merge
        if: ${{ inputs.auto_merge && steps.cpr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash --repo "${{ github.repository_owner }}/${{ vars.INFRA_REPO_NAME }}" "$PR"
