name: mainsite-web Deploy

# Builds the Next.js frontend and uploads it to the infra-managed Azure Static
# Web App (mainsite-web-prod) using its deployment token. The SWA resource
# itself is provisioned in the infra repo (bicep/web.bicep), not here.
on:
  push:
    branches: [main]
    paths:
      - 'apps/mainsite/web/**'
      - '.github/workflows/mainsite-web-deploy.yaml'
  workflow_dispatch:

concurrency:
  group: mainsite-web-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest

    # Scoped to the azure-swa environment, which holds AZURE_STATIC_WEB_APPS_API_TOKEN
    # (mirrors azure-acr for the api build). No reviewer gate — trunk-based auto-deploy.
    environment: azure-swa

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          TURBO_CACHE_DIR: .turbo

      - name: Deploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/mainsite/web
          output_location: .next
          skip_app_build: true
