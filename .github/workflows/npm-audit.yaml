name: npm Audit

# Time-dependent security checks, decoupled from PR CI: a new npm advisory can
# appear against an unchanged lockfile, flipping every open PR red regardless
# of its diff. Runs on a daily schedule (plus pushes to main that touch the
# dependency tree) instead of blocking unrelated PRs, mirroring
# portal-api-security.yaml for the Rust side.
on:
  schedule:
    - cron: "45 5 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "pnpm-lock.yaml"
      - ".github/workflows/npm-audit.yaml"

concurrency:
  group: npm-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: npm advisories (pnpm audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # open/update the tracking issue on failure
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Open or update tracking issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="npm: dependency audit failing"
          body="The scheduled npm audit found one or more advisories affecting production dependencies.

          Failing run: $RUN_URL

          Triage options:
          - Upgrade the affected dependency (or wait for the Dependabot security PR).
          - For a vulnerable transitive dependency with a patched release, add a version-floor entry to \`pnpm.overrides\` in the root \`package.json\`.
          - If no fix exists upstream, the fix is usually bumping the direct dependency that pulls it in."
          number=$(gh issue list --state open --search "\"$title\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "$number" ]; then
            gh issue comment "$number" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi
