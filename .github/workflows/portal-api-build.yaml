name: Portal API Build

# Builds, pushes, and signs the API image on a release tag, then opens a dev
# image-bump PR in the infra repo. Triggered by release-please tags.
on:
  push:
    tags:
      - "portal-api-v*"

concurrency:
  group: portal-api-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # Azure OIDC login + cosign keyless signing

env:
  IMAGE_NAME: portal-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: azure-acr # OIDC subject must match the id-github-acr-push federated credential
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute image name and tag
        id: meta
        run: |
          version="${GITHUB_REF_NAME#portal-api-v}"
          echo "tag=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${{ vars.ACR_LOGIN_SERVER }}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: apps/portal/api
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          # No `:latest` — it is a mutable floating tag nothing deploys from, and
          # publishing it only creates an overwrite target. Deploys pin the
          # immutable version tag; `sha-<commit>` stays for traceability.
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=portal-api
          cache-to: type=gha,mode=max,scope=portal-api

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image by digest
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

  update-infra-dev:
    needs: build-and-push
    uses: ./.github/workflows/_update-infra.yaml
    with:
      image: portal-api
      app_group: portal
      tag: ${{ needs.build-and-push.outputs.tag }}
      environment: dev
      auto_merge: true
    secrets:
      infra_app_id: ${{ secrets.INFRA_APP_ID }}
      infra_app_key: ${{ secrets.INFRA_APP_KEY }}
