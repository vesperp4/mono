name: Portal API Promote Prod

# Manually promotes the currently-deployed dev image tag to prod. The `production`
# environment gate requires reviewer approval before the tag is resolved.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    environment: prod # required-reviewer approval gate (matches infra's prod env naming)
    outputs:
      tag: ${{ steps.read.outputs.tag }}
    steps:
      - name: Mint infra-repo app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.INFRA_APP_ID }}
          private-key: ${{ secrets.INFRA_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ vars.INFRA_REPO_NAME }}

      - name: Checkout infra repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.repository_owner }}/${{ vars.INFRA_REPO_NAME }}
          token: ${{ steps.app-token.outputs.token }}
          path: infra
          persist-credentials: false

      - name: Checkout this repo (for CI scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: actions-repo

      - name: Read deployed dev tag
        id: read
        run: |
          tag="$(bash actions-repo/scripts/ci/read-bicepparam-tag.sh infra/apps/dev/portal/portal-api.bicepparam)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  promote:
    needs: resolve
    uses: ./.github/workflows/_update-infra.yaml
    with:
      image: portal-api
      app_group: portal
      tag: ${{ needs.resolve.outputs.tag }}
      environment: prod
      auto_merge: false
    secrets:
      infra_app_id: ${{ secrets.INFRA_APP_ID }}
      infra_app_key: ${{ secrets.INFRA_APP_KEY }}
