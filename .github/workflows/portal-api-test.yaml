name: Portal API Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: portal-api-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            api:
              - 'apps/portal/api/**'
              - '.github/workflows/portal-api-test.yaml'
              - '.github/workflows/_rust-service-test.yaml'
              - 'scripts/ci/required-gate.sh'

  test:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    uses: ./.github/workflows/_rust-service-test.yaml
    with:
      working-directory: apps/portal/api
      package: portal-api

  # Always-reporting aggregate so this check can be marked "required" in branch
  # protection even when `test` is skipped (no API changes in the PR).
  api-required:
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Required gate
        run: bash scripts/ci/required-gate.sh
        env:
          LABEL: API
          CHANGED: ${{ needs.changes.outputs.api }}
          RESULT: ${{ needs.test.result }}
