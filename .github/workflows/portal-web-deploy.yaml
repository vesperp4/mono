name: portal-web Deploy

# Builds the Next.js portal frontend and uploads it to the infra-managed Azure
# Static Web Apps (portal-web-dev + portal-web-prod) using their deployment
# tokens. The SWA resources themselves are provisioned in the infra repo
# (bicep/web.bicep), not here.
on:
  push:
    branches: [main]
    paths:
      - 'apps/portal/web/**'
      - '.github/workflows/portal-web-deploy.yaml'
  workflow_dispatch:

concurrency:
  group: portal-web-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Gate: never ship a bundle whose tests fail. Both deploy legs depend on this,
  # so a broken merge (e.g. a semantic conflict between two green PRs) is caught
  # before it reaches dev or prod instead of racing the separate test workflow.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm turbo test --filter=portal-web
        env:
          NEXT_TELEMETRY_DISABLED: 1

  deploy:
    name: Deploy ${{ matrix.env }}
    needs: test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Each leg builds its own bundle because NEXT_PUBLIC_API_URL is baked
          # in at build time — the dev site must talk to the dev API so the
          # vp4_session cookie stays same-site with portal.dev.vesperp4.com.
          - env: dev
            gh_environment: azure-swa-portal-dev
            api_url: https://api.portal.dev.vesperp4.com
          - env: prod
            gh_environment: azure-swa-portal
            api_url: https://api.portal.vesperp4.com

    # Each GitHub environment holds its SWA's AZURE_STATIC_WEB_APPS_API_TOKEN
    # (mirrors azure-swa for mainsite-web). No reviewer gate — trunk-based
    # auto-deploy to both stages on every main push.
    environment: ${{ matrix.gh_environment }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ matrix.env }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-${{ matrix.env }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build --filter=portal-web
        env:
          NEXT_TELEMETRY_DISABLED: 1
          TURBO_CACHE_DIR: .turbo
          # NEXT_PUBLIC_* is baked in at build time — without this the bundle
          # falls back to same-origin ("") and every API call 404s against the
          # static site. Custom domain (not the raw Container Apps FQDN) so the
          # vp4_session cookie is same-site with the portal web origin.
          NEXT_PUBLIC_API_URL: ${{ matrix.api_url }}

      - name: Deploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/portal/web
          output_location: .next
          skip_app_build: true
