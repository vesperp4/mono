name: Protect Main

on:
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  check-source-branch:
    name: Source branch must be dev
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        if: github.head_ref != 'dev'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "PRs to main must come from dev. Current branch: $HEAD_REF"
          exit 1
