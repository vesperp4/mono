name: Secret Scan

# TruffleHog is used instead of the gitleaks Action because the latter requires a
# paid license for organization-owned repos. TruffleHog OSS is free for orgs.
on:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so the PR diff can be scanned
      - uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          # Only fail on verified (live) secrets to avoid false positives on
          # example/dummy values (e.g. apps/portal/web/.env.example).
          extra_args: --results=verified
