name: TV Engine Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tv-engine-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            engine:
              - 'apps/tv/engine/**'
              - 'packages/**'
              - '.github/workflows/tv-engine-test.yaml'
              - 'scripts/ci/required-gate.sh'

  test:
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck --filter=tv-engine
      - name: Test
        run: pnpm turbo test --filter=tv-engine

  engine-required:
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Required gate
        run: bash scripts/ci/required-gate.sh
        env:
          LABEL: TV Engine
          CHANGED: ${{ needs.changes.outputs.engine }}
          RESULT: ${{ needs.test.result }}
