name: Website API Build

# Builds, pushes, and signs the API image on a release tag, then opens a dev
# image-bump PR in the infra repo. Triggered by release-please tags.
on:
  push:
    tags:
      - "vesperp4-api-v*"

concurrency:
  group: website-api-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # Azure OIDC login + cosign keyless signing

env:
  IMAGE_NAME: vesperp4-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: azure-acr # OIDC subject must match the id-github-acr-push federated credential
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Compute image name and tag
        id: meta
        run: |
          version="${GITHUB_REF_NAME#vesperp4-api-v}"
          echo "tag=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${{ vars.ACR_LOGIN_SERVER }}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/website/api
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=website-api
          cache-to: type=gha,mode=max,scope=website-api

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image by digest
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

  update-infra-dev:
    needs: build-and-push
    uses: ./.github/workflows/_update-infra.yaml
    with:
      image: vesperp4-api
      tag: ${{ needs.build-and-push.outputs.tag }}
      environment: dev
      auto_merge: true
    secrets:
      infra_app_id: ${{ secrets.INFRA_APP_ID }}
      infra_app_key: ${{ secrets.INFRA_APP_KEY }}
