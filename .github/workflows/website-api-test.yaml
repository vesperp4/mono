name: Website API Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: website-api-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            api:
              - 'apps/website/api/**'
              - '.github/workflows/website-api-test.yaml'
              - '.github/workflows/_rust-service-test.yaml'
              - 'scripts/ci/required-gate.sh'

  test:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    uses: ./.github/workflows/_rust-service-test.yaml
    with:
      working-directory: apps/website/api
      package: vesperp4-api

  # Always-reporting aggregate so this check can be marked "required" in branch
  # protection even when `test` is skipped (no API changes in the PR).
  api-required:
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Required gate
        run: bash scripts/ci/required-gate.sh
        env:
          LABEL: API
          CHANGED: ${{ needs.changes.outputs.api }}
          RESULT: ${{ needs.test.result }}
