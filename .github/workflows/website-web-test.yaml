name: Website Web Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: website-web-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            web:
              - 'apps/website/web/**'
              - 'packages/**'
              - '.github/workflows/website-web-test.yaml'
              - 'scripts/ci/required-gate.sh'

  test:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm turbo test --filter=website
        env:
          NEXT_TELEMETRY_DISABLED: 1

  web-required:
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Required gate
        run: bash scripts/ci/required-gate.sh
        env:
          LABEL: Web
          CHANGED: ${{ needs.changes.outputs.web }}
          RESULT: ${{ needs.test.result }}
