# cargo-deny configuration. Tune as the dependency tree grows.
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail on known RUSTSEC advisories (plus unmaintained/yanked crates). The
# advisories check runs in the scheduled security workflow
# (portal-api-security.yaml); PR CI runs only `check bans licenses sources`.
yanked = "deny"

# Accepted advisories. Keep this EMPTY. Only add an entry when an advisory has
# NO fix available AND is not exercised by our usage — always with a `reason`
# and an open tracking issue stating when to re-evaluate. Every other advisory
# (including any with an available fix) must fail the scan and be fixed instead.
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
# Allow the common permissive licenses found in the Rust ecosystem.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
