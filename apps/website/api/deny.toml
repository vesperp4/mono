# cargo-deny configuration. Tune as the dependency tree grows.
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail on known RUSTSEC advisories. `cargo audit` covers this too; cargo-deny
# additionally checks unmaintained/yanked crates.
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
# Allow the common permissive licenses found in the Rust ecosystem.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
