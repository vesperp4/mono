[tools]
node = "22"
pnpm = "10.33.0"
turbo = "latest"

# GitHub CLI — PR/issue management and gh-driven scripting from the terminal.
gh = "latest"

# Pre-commit framework — drives `.pre-commit-config.yaml`.
pre-commit = "latest"

# Python + pipx — runtime for pre-commit (Python zipapp) and the venv backend
# pipx uses to install Python apps (Azure CLI; commitizen via scripts/setup_project).
# See .devcontainer/tooling.md.
python = "3.12"
pipx = "1.12.0"

# Azure tooling — for inspecting/operating Azure and Entra (the chapter's IaC
# deploys live in the separate infra repo; see docs/entra-identity.md for Entra).
"azure" = "2.86.0"  # Azure CLI (`az`), installed via pipx

# Rust toolchain for the API service (apps/mainsite/api also pins via
# rust-toolchain.toml; rustup honors that when entering the crate).
rust = "1.93.1"

# CI quality/security tooling — mirrors the GitHub Actions gates so they can be
# reproduced locally.
actionlint = "latest"
shellcheck = "latest"
trivy = "latest"
cosign = "latest"

# Rust CI helpers (cargo-installed binaries).
"cargo:cargo-deny" = "latest"
"cargo:cargo-audit" = "latest"
"cargo:cargo-llvm-cov" = "latest"
"cargo:sqlx-cli" = "latest"

[settings]
# Required for [hooks] below.
experimental = true

[env]
# Applied to every `mise run` task. Keeps Next.js quiet and pins Turbo's cache
# dir so local runs share the same cache CI uses.
NEXT_TELEMETRY_DISABLED = "1"
TURBO_CACHE_DIR = ".turbo"

[hooks]
enter = "bash ./scripts/setup_project"

# ===========================================================================
# `mise run` is the front door. New here? Run `mise tasks` to see everything,
# `mise run setup` once, then `mise run dev`. Before pushing: `mise run check`.
# ===========================================================================

# --- Everyday workflow -----------------------------------------------------

[tasks.setup]
description = "First-time setup: install dependencies and wire up git hooks"
run = """
pnpm install
pre-commit install --hook-type pre-commit --hook-type commit-msg
"""

[tasks.dev]
description = "Start the dev server(s) with hot reload (web → http://localhost:3000)"
run = "pnpm turbo dev"

[tasks.build]
description = "Build everything the way CI does (production build)"
run = "pnpm turbo build"

[tasks.format]
description = "Auto-format the codebase (Prettier)"
run = "pnpm turbo format --continue"

# --- Local database (for the API + integration tests) ----------------------

[tasks.db-up]
description = "Start a local Postgres for development and integration tests"
run = "docker run --rm -d --name vesperp4-pg -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=vesperp4 -p 5432:5432 postgres:17"

[tasks.db-down]
description = "Stop the local Postgres"
run = "docker rm -f vesperp4-pg"

# --- Quality gates: each mirrors a GitHub Actions check --------------------

[tasks.format-check]
description = "Check formatting without writing (mirrors ci.yml)"
run = "pnpm turbo format-check"

[tasks.audit]
description = "Audit production dependencies for CVEs (mirrors ci.yml)"
run = "pnpm audit --prod"

[tasks.check-web]
description = "Web/TS gate: lint, typecheck, test, build (mirrors ci.yml + mainsite-web-test.yaml)"
run = "pnpm turbo lint typecheck test build"

[tasks.check-api]
description = "API gate: fmt, clippy, deny, audit, coverage (mirrors _rust-service-test.yaml). Needs `mise run db-up`."
dir = "apps/mainsite/api"
shell = "bash -c"
env = { DATABASE_URL = "postgres://postgres:postgres@localhost:5432/vesperp4" }
run = """
set -euo pipefail
cargo fmt --all --check
cargo clippy --all-targets --all-features -- -D warnings
cargo deny check
cargo audit
cargo llvm-cov --all-features --workspace
"""

[tasks.lint-workflows]
description = "Lint GitHub Actions workflows with actionlint"
run = "actionlint"

[tasks.lint-scripts]
description = "Lint shell scripts with shellcheck"
run = "shellcheck scripts/ci/*.sh scripts/setup scripts/setup_project"

# --- The aggregate: run this before pushing --------------------------------

[tasks.check]
description = "Run every local gate (mirrors CI). Run before pushing."
depends = ["lint-workflows", "lint-scripts", "audit", "format-check", "check-web", "check-api"]
